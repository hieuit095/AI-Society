# ─────────────────────────────────────────────────────────────
# ZeroClaw AI Society — Docker Compose Orchestration
# ─────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: .
      dockerfile: society-server/Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      RUST_LOG: "society_server=info,society_core=info"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
